# LISTENING
listen=YES
listen_port=21
listen_ipv6=NO

# BASIC
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
xferlog_enable=YES
xferlog_std_format=YES
connect_from_port_20=YES

# SECURITY
chroot_local_user=YES
allow_writeable_chroot=YES
secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd

# SSL/TLS (EXPLICIT FTPS - port 21)
ssl_enable=YES
allow_anon_ssl=NO
force_local_data_ssl=YES
force_local_logins_ssl=YES
ssl_tlsv1=YES
ssl_sslv2=NO
ssl_sslv3=NO
require_ssl_reuse=NO
ssl_ciphers=HIGH
rsa_cert_file=/etc/vsftpd/vsftpd.crt
rsa_private_key_file=/etc/vsftpd/vsftpd.key

# PASV MODE
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40009
pasv_address=10.10.10.1
pasv_addr_resolve=NO

# OTHER
seccomp_sandbox=NO
